
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskFlow - Gerenciador de Tarefas{% endblock %}</title>
    <style>
        /* Modern Color Palette */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #f8fafc;
            --accent: #06d6a0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-light: #94a3b8;
            --background: #ffffff;
            --surface: #f8fafc;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
        }

        /* Dark mode colors */
        @media (prefers-color-scheme: dark) {
            :root {
                --secondary: #0f172a;
                --text-primary: #f1f5f9;
                --text-secondary: #cbd5e1;
                --text-light: #94a3b8;
                --background: #0f172a;
                --surface: #1e293b;
                --border: #334155;
                --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
                --shadow-lg: 0 20px 40px -10px rgba(0, 0, 0, 0.4);
            }
        }

        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--surface) 0%, var(--background) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Hyperlink Styles - SEMPRE BRANCOS */
        a {
            color: white !important;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: #f0f0f0 !important;
            text-decoration: underline;
        }

        /* Exceções específicas */
        .logo {
            color: var(--primary) !important;
        }

        .logo:hover {
            color: var(--primary-dark) !important;
            text-decoration: none;
        }

        .nav-link {
            color: var(--text-secondary) !important;
        }

        .nav-link:hover, .nav-link.active {
            color: white !important;
            text-decoration: none;
        }

        .btn {
            color: inherit !important;
            text-decoration: none;
        }

        .btn:hover {
            color: inherit !important;
            text-decoration: none;
        }

        /* Header Styles */
        header {
            background: var(--background);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo::before {
            content: "✓";
            background: var(--primary);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-link {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--primary);
        }

        /* Main Content Area */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .content-container {
            background: var(--background);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        /* Footer Styles */
        footer {
            background: var(--surface);
            padding: 2rem;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-light);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Message Styles */
        .messages {
            margin-bottom: 2rem;
        }

        .message {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-weight: 500;
            border-left: 4px solid;
        }

        .message.success {
            background: rgba(6, 214, 160, 0.1);
            border-left-color: var(--accent);
            color: #059669;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border-left-color: #ef4444;
            color: #dc2626;
        }

        .message.info {
            background: rgba(99, 102, 241, 0.1);
            border-left-color: var(--primary);
            color: var(--primary-dark);
        }

        /* Button Styles */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-success {
            background: var(--accent);
            color: white;
        }

        .btn-success:hover {
            background: #05b786;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 
        .card:not(.task-item) {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        transition: all 0.3s ease;
        }

/* Estilo específico para os itens de tarefa */
.task-item.card {
    background: transparent;
    border: 1px solid var(--border);
    backdrop-filter: blur(8px);
}        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        /* Task-specific styles */
        .task-item {
            cursor: pointer;
            position: relative;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .task-checkbox:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .task-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .task-description {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .task-meta {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        /* Links dentro do conteúdo - mantêm cor do texto */
        .content-container a:not(.btn):not(.nav-link):not(.logo) {
            color: var(--text-primary) !important;
            text-decoration: underline;
            text-decoration-color: var(--primary);
        }

        .content-container a:not(.btn):not(.nav-link):not(.logo):hover {
            color: var(--primary) !important;
            text-decoration-color: var(--primary-dark);
        }

        /* Utility Classes */
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        
        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }
        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .mb-3 { margin-bottom: 1.5rem; }
        
        .d-flex { display: flex; }
        .justify-between { justify-content: space-between; }
        .align-center { align-items: center; }
        .gap-2 { gap: 1rem; }
        .gap-3 { gap: 1.5rem; }
        
        .flex-grow-1 { flex-grow: 1; }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-content {
                padding: 1rem;
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav-links {
                width: 100%;
                justify-content: center;
            }
            
            main {
                padding: 1rem;
            }
            
            .content-container {
                padding: 1.5rem;
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-container {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="{% url 'todo:task_list' %}" class="logo">TaskFlow</a>
            <nav class="nav-links">
                <a href="{% url 'todo:task_list' %}" class="nav-link active">Minhas Tarefas</a>
                <a href="{% url 'todo:task_create' %}" class="btn btn-primary">Nova Tarefa</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="content-container">
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="message {{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}
            <!-- Page content will be inserted here -->
            {% endblock %}
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>TaskFlow &copy; {% now "Y" %} - Um projeto Django moderno</p>
        </div>
    </footer>
</body>
</html>
