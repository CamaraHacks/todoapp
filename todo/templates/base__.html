<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskFlow{% endblock %}</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #8e8e93;
            --accent: #000000;
            --accent-hover: #333333;
            --border-color: #f2f2f7;
            --card-bg: #ffffff;
            --item-hover: #f9f9f9;
            --danger: #ff3b30;
            --sidebar-width: 260px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0d0d0d;
                --text-main: #f2f2f7;
                --text-muted: #8e8e93;
                --accent: #ffffff;
                --accent-hover: #e5e5e5;
                --border-color: #1c1c1e;
                --card-bg: #141414;
                --item-hover: #1c1c1e;
                --danger: #ff453a;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        /* Layout Structure */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: var(--sidebar-width);
            border-right: 1px solid var(--border-color);
            padding: 3rem 1.5rem;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.04em;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .logo-box {
            width: 24px;
            height: 24px;
            background-color: var(--accent);
            border-radius: 6px;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .nav-item a {
            display: block;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .nav-item a:hover {
            background-color: var(--item-hover);
            color: var(--text-main);
        }

        .nav-item a.active {
            background-color: var(--item-hover);
            color: var(--text-main);
            font-weight: 600;
        }

        /* Main Content Area */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 4rem 2rem;
            display: flex;
            justify-content: center;
        }

        .content-wrapper {
            max-width: 800px;
            width: 100%;
        }

        /* Global UI Elements */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 2.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--bg-color);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: scale(0.98);
        }

        .btn-ghost {
            background-color: transparent;
            color: var(--text-muted);
        }

        .btn-ghost:hover {
            background-color: var(--item-hover);
            color: var(--text-main);
        }

        /* Messages */
        .messages {
            margin-bottom: 2rem;
        }

        .message {
            padding: 1rem 1.25rem;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            background-color: var(--item-hover);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .app-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 1.5rem;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            .main-content {
                margin-left: 0;
                padding: 2.5rem 1.5rem;
            }
            .nav-menu {
                flex-direction: row;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-box"></div>
                AnyTask
            </div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="{% url 'todo:task_list' %}" class="{% if request.resolver_match.url_name == 'task_list' %}active{% endif %}">
                            Tarefas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'todo:task_create' %}" class="{% if request.resolver_match.url_name == 'task_create' %}active{% endif %}">
                            Nova Tarefa
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="content-wrapper">
                {% if messages %}
                    <div class="messages">
                        {% for message in messages %}
                            <div class="message">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}

                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
